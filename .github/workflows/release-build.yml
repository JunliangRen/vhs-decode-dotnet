name: Release build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  build:
    name: Build and test Windows release
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET 11 Preview 6
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Install FFmpeg test dependency
        run: choco install ffmpeg --yes --no-progress --limit-output

      - name: Restore dependencies
        run: dotnet restore VHSDecodeDotNet.slnx

      - name: Build release
        run: dotnet build VHSDecodeDotNet.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --solution VHSDecodeDotNet.slnx --configuration Release --no-build --no-restore --minimum-expected-tests 848

      - name: Upload release build artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: vhs-decode-dotnet-windows-${{ github.sha }}
          path: src/VHSDecode.Cli/bin/Release/net11.0/
          if-no-files-found: error
          retention-days: 30
